verdict = "SPEC_PLUS_RUNNABLE"   # 2026-05-07 — was SPEC_FIRST at v1.0.0
extracted_from = "canon/domains/compute/ @ c0f1f570"
spec_count_caveat = "kick-spec one-liner read '28-verb / 7-group'; explicit verb_map enumerated 29 verbs across 6 group categories. v1.0.0 honors the line-by-line map."
runnable_surface = "verify/cli.hexa (5 checks) + verify/verb_runner.hexa (29 sandboxes) + tests/run_tests.hexa (4 tests) — make ci aggregates"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "29-verb 통합 chip substrate (6 그룹: architecture + design + process + packaging + accelerator + consciousness). Spec-first; per-verb working .hexa CLI sandboxes TBD. Korea-fab heritage tone (Samsung·SK·Hynix)."
not_scope = [
    "Tape-out / mask-set generation (no GDSII writer)",
    "Foundry PDK distribution (no proprietary process kits vendored)",
    "EDA tool replacement (Cadence/Synopsys/Mentor stays canonical)",
    "Wet-fab calibration (out-of-repo; runs on physical wafers only)"
]
