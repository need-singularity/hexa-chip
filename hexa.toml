# hexa.toml — hexa-chip standalone package manifest
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Distribution target: hx install hexa-chip
# Provenance: extracted from canon/domains/compute/ on 2026-05-06
#             (n6-arch SHA c0f1f570; 28-verb 7-group chip substrate)

[package]
name = "hexa-chip"
version = "1.0.0"
entry = "cli/hexa-chip.hexa"
description = "Chip substrate — 29-verb semiconductor stack (architecture / design / EDA / process / packaging / NPU / PIM / 3D / photonic / RTL-gen / yield / consciousness-chip)."
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-chip"
homepage = "https://github.com/need-singularity/hexa-chip"
readme = "README.md"
keywords = [
    "semiconductor", "chip-architecture", "rtl", "eda", "npu", "pim",
    "photonic", "packaging", "hbm", "advanced-packaging", "yield",
    "consciousness-chip", "n6-invariant", "korea-fab"
]
categories = ["hardware", "compute", "semiconductor", "eda"]

[[bin]]
name = "hexa-chip"
path = "cli/hexa-chip.hexa"

[scripts]
install = "install.hexa"

# ── 6-group / 29-verb manifest ─────────────────────────────
# Group A — architecture (3 verbs)
#   architecture · isa_n6 · hexa1
# Group B — design (5 verbs)
#   design · dse_pipeline · rtl_gen · eda · verify_test
# Group C — process (5 verbs)
#   process · materials · wafer · yield · thermal_power
# Group D — packaging (6 verbs)
#   packaging · advanced_packaging · chip_3d · hbm · interconnect · sc
# Group E — accelerator (8 verbs)
#   npu_n6 · pim · photonic · accel · asic · hexa_pim · hexa_3d · hexa_wafer
# Group F — consciousness (2 verbs)
#   conscious_chip · conscious_soc
#
# NOTE — kick-spec one-liner reads "28-verb / 7-group"; the explicit
# verb_map enumeration totals 29 verbs across 6 group categories (the
# 7th "group" in the headline does not appear in the line-by-line map).
# This v1.0.0 honors the line-by-line map → 29 verbs / 6 groups.
[modules.architecture]
verbs = ["architecture", "isa_n6", "hexa1"]
[modules.design]
verbs = ["design", "dse_pipeline", "rtl_gen", "eda", "verify_test"]
[modules.process]
verbs = ["process", "materials", "wafer", "yield", "thermal_power"]
[modules.packaging]
verbs = ["packaging", "advanced_packaging", "chip_3d", "hbm", "interconnect", "sc"]
[modules.accelerator]
verbs = ["npu_n6", "pim", "photonic", "accel", "asic", "hexa_pim", "hexa_3d", "hexa_wafer"]
[modules.consciousness]
verbs = ["conscious_chip", "conscious_soc"]

# ── Meta-domain envelope (terafab) ─────────────────────────
# 메타-도메인은 verb 가 아니라 6 그룹 전체를 바깥에서 감싸는 외피.
# Terafab 은 "Tesla/xAI/SpaceX 의 수직-통합 megafab" 외부 관찰값을
# 흡수한 envelope 으로, 28-verb / 6-group 카운트는 변경하지 않는다.
# (절대로 새로운 verb 가 아님 — 6 그룹의 외부 wrapper 로만 등록.)
[meta_domains.terafab]
absorbs = ["architecture", "design", "process", "packaging", "accelerator", "consciousness"]
type = "vertically-integrated-megafab"
source = "external-research absorption (2026-05-11)"
entry = "terafab/terafab.md"
falsifier_count = 7      # F-TERAFAB-1..7
nda_content = false
note = "Outer envelope wrapping the 6 hexa-chip groups; NOT a verb. Does not change the 28-verb / 6-group counts."

# ── Dependencies ───────────────────────────────────────────
# All verbs are spec-first at v1.0.0 — no Python or external deps required.
[dependencies]
hexa-lang = ">=1.0.0"

# ── Closure provenance (raw#10 honest C3) ─────────────────
# v1.0.0 closure: 28-verb spec-first extraction. Working .hexa CLI dispatcher
# is a placeholder router that lists groups + verbs; per-verb sandboxes are
# spec-only at this release.
[closure]
verbs_total = 29
groups_total = 6
verbs_wired = 29       # 2026-05-07 buildout: every verb has verify_<verb>.hexa
verbs_spec = 29
verdict = "SPEC_PLUS_RUNNABLE"   # 2026-05-07 — was SPEC_FIRST at v1.0.0
extracted_from = "canon/domains/compute/ @ c0f1f570"
spec_count_caveat = "kick-spec one-liner read '28-verb / 7-group'; explicit verb_map enumerated 29 verbs across 6 group categories. v1.0.0 honors the line-by-line map."
runnable_surface = "verify/cli.hexa (5 checks) + verify/verb_runner.hexa (29 sandboxes) + tests/run_tests.hexa (4 tests) — make ci aggregates"

# ── Scope honesty (raw#10 C3) ─────────────────────────────
[scope]
honest_scope = "29-verb 통합 chip substrate (6 그룹: architecture + design + process + packaging + accelerator + consciousness). Spec-first; per-verb working .hexa CLI sandboxes TBD. Korea-fab heritage tone (Samsung·SK·Hynix)."
not_scope = [
    "Tape-out / mask-set generation (no GDSII writer)",
    "Foundry PDK distribution (no proprietary process kits vendored)",
    "EDA tool replacement (Cadence/Synopsys/Mentor stays canonical)",
    "Wet-fab calibration (out-of-repo; runs on physical wafers only)"
]
n6_lattice_caveat = "n=6 invariant referenced for ISA/architecture decomposition only (isa_n6, hexa1). Process/packaging/accelerator groups inherit organising convention without independent invariant-fit verification."

# ── Meta-domain closure (terafab envelope, Wave A~D) ──────
# 메타-도메인 closure 는 verb-level closure 와 *별개의* 회계.
# Terafab envelope 은 28-verb / 6-group 표면을 변경하지 않고
# 외피로만 등록되며, 자체 falsifier register (F-TERAFAB-1..10) 와
# runnable verify_terafab.py / cross_doc_audit.py 한 쌍으로
# closure 를 선언한다. (verb 카운트는 위 [closure] 가 단일 권위.)
[meta_domain_closure]
envelopes_total = 1                  # terafab
envelopes_wired = 1                  # has runnable verify_terafab.py
envelopes_audited = 1                # cross_doc_audit.py passes
falsifiers_total = 10                # F-TERAFAB-1..10 (7 Mk.I + 3 Mk.II)
falsifiers_runnable = 10             # all 10 dispatched by verify_terafab.py
groups_wrapped = 6                   # all 6 hexa-chip groups absorbed
verdict = "SPEC_PLUS_RUNNABLE"
verb_surface_unchanged = true        # verbs_total/groups_total NOT bumped
nda_content = false
extracted_from = "external-research absorption (2026-05-11) — Musk Terafab announce 2026-03-21, Intel join 2026-04-07, SpaceX TX filing 2026-05-06"
caveat = "Meta-domain envelope; F-TERAFAB-1..6 are bench-only at Mk.I (data-arrival pending); F-TERAFAB-7 χ² currently weak (p≈0.86), reformulation deferred to Mk.II per terafab/falsifier-mk2-scaffold.md."

[cost]
mac_local_default = "$0 (spec-first; no external tooling invoked)"
